<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#111720" stroke="#1c2530" stroke-width="1.5"/>

  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="16" stroke="#3b9eff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="3" fill="#00e5a0"/>

  <!-- Head -->
  <rect x="16" y="16" width="32" height="26" rx="8" fill="#0d1219" stroke="#3b9eff" stroke-width="2.5"/>

  <!-- Eyes: one blue circle, one green dollar-eye (the "funny" wink) -->
  <circle cx="25.5" cy="29" r="4" fill="#3b9eff"/>
  <text x="38.5" y="33" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#00e5a0" text-anchor="middle">$</text>

  <!-- Mouth: flat cheeky grin -->
  <path d="M23 37.5 Q32 41 41 37" stroke="#3b9eff" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Neck / body hint -->
  <rect x="24" y="44" width="16" height="8" rx="3" fill="#0d1219" stroke="#1c2530" stroke-width="1.5"/>
</svg>
